<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadOnc Meetings — 방사선종양학·의학물리 학회 일정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#10202b; --ink-soft:#4a5c68; --paper:#f3f6f7; --card:#fff; --line:#dbe4e8;
  --kr:#0e7a6f; --na:#1f5fa8; --eu:#7a4bbf; --jp:#c04a3a; --intl:#8a6d1f;
  --tbd:#8a97a0; --beam:#e8b931;
  --radius:14px; --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55}

header{background:var(--ink);color:#eef4f6;padding:38px 24px 30px;position:relative}
header::after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;
  background:linear-gradient(90deg,var(--kr) 0 20%,var(--na) 20% 40%,var(--eu) 40% 60%,var(--jp) 60% 80%,var(--intl) 80% 100%)}
.wrap{max-width:1020px;margin:0 auto;position:relative}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;color:var(--beam);text-transform:uppercase;margin-bottom:10px}
header h1{font-size:clamp(23px,4vw,32px);font-weight:700}
header p.sub{margin-top:8px;color:#a9bcc6;font-size:14px;max-width:700px}
.updated{font-family:var(--mono);font-size:12px;color:#7f96a2;margin-top:12px}
.updated b{color:var(--beam)}

/* language switch */
.langsw{position:absolute;top:0;right:0;display:flex;border:1px solid #3a4e5b;border-radius:9px;overflow:hidden}
.langsw button{background:none;border:none;color:#8fa5b1;font-family:var(--mono);font-size:12px;
  font-weight:600;padding:6px 12px;cursor:pointer;letter-spacing:.05em}
.langsw button.on{background:var(--beam);color:var(--ink)}
.langsw button:not(:last-child){border-right:1px solid #3a4e5b}

.aibar{max-width:1020px;margin:-1px auto 0;padding:0 24px}
.aibar-in{background:var(--card);border:1px solid var(--line);border-top:none;
  border-radius:0 0 var(--radius) var(--radius);padding:13px 20px;
  display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;font-size:13.5px}
.btn-update{background:var(--ink);color:#fff;border:none;border-radius:9px;padding:9px 18px;
  font-family:var(--sans);font-size:13.5px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;transition:opacity .15s}
.btn-update:hover{opacity:.88}
.btn-update:disabled{opacity:.5;cursor:wait}
.btn-update .dot{width:8px;height:8px;border-radius:50%;background:var(--beam)}
.btn-update.running .dot{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
#updStatus{color:var(--ink-soft);flex:1;min-width:200px}
#updStatus .ok{color:#0d6b56;font-weight:600}
#updStatus .err{color:#a3352a;font-weight:600}
.ai-note{font-size:12px;color:var(--tbd);width:100%}

.controls{max-width:1020px;margin:24px auto 4px;padding:0 24px;display:flex;flex-wrap:wrap;gap:9px;align-items:center}
.chip{border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);
  border-radius:999px;padding:7px 15px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans)}
.chip:hover{border-color:#b7c6cd}
.chip.on{color:#fff;border-color:transparent;background:var(--ink)}
select{border:1.5px solid var(--line);background:var(--card);border-radius:9px;padding:7px 10px;
  font-family:var(--sans);font-size:13px;color:var(--ink)}
.spacer{flex:1}
.toggle-past{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);background:none;border:none;
  cursor:pointer;text-decoration:underline;text-underline-offset:3px}

main{max-width:1020px;margin:0 auto 70px;padding:0 24px}
.yeargroup{margin-top:32px}
.yeargroup h2{font-family:var(--mono);font-size:15px;letter-spacing:.12em;color:var(--ink-soft);
  display:flex;align-items:center;gap:14px}
.yeargroup h2::after{content:"";flex:1;height:1px;background:var(--line)}
.cards{margin-top:13px;display:grid;gap:11px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 20px;display:grid;gap:3px 18px;grid-template-columns:116px 1fr auto;
  align-items:start;border-left:5px solid var(--line)}
.card:hover{box-shadow:0 3px 14px rgba(16,32,43,.08)}
.card[data-g="KR"]{border-left-color:var(--kr)}
.card[data-g="NA"]{border-left-color:var(--na)}
.card[data-g="EU"]{border-left-color:var(--eu)}
.card[data-g="JP"]{border-left-color:var(--jp)}
.card[data-g="INTL"]{border-left-color:var(--intl)}
.card.past{opacity:.5;border-left-color:var(--tbd)!important}
.card.fresh{animation:flash 1.6s ease-out}
@keyframes flash{0%{background:#fdf6dd}100%{background:var(--card)}}

.date{font-family:var(--mono);font-size:13px;line-height:1.45}
.date .mo{font-weight:600;font-size:14.5px}
.date .tbd{color:var(--tbd);font-weight:500}
.body h3{font-size:16px;font-weight:600}
.body h3 a{color:inherit;text-decoration:none;border-bottom:1.5px solid transparent}
.body h3 a:hover{border-bottom-color:currentColor}
.meta{font-size:13.5px;color:var(--ink-soft);margin-top:2px}
.meta .loc{font-weight:500;color:var(--ink)}
.note{font-size:12.5px;color:var(--ink-soft);margin-top:5px}
.note::before{content:"※ ";color:var(--tbd)}
.right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.badge{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;font-weight:600;padding:3px 8px;border-radius:6px;white-space:nowrap}
.badge.ok{background:#e2f2ec;color:#0d6b56}
.badge.part{background:#fdf3d7;color:#8a6a10}
.badge.tbd{background:#eef1f3;color:var(--tbd)}
.badge.done{background:#eef1f3;color:var(--tbd);text-decoration:line-through}
.ddaytag{font-family:var(--mono);font-size:12px;font-weight:600}
.ddaytag.hot{color:#b3690a}
.soc{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;font-weight:600;display:inline-block;margin-bottom:1px}
.card[data-g="KR"] .soc{color:var(--kr)}
.card[data-g="NA"] .soc{color:var(--na)}
.card[data-g="EU"] .soc{color:var(--eu)}
.card[data-g="JP"] .soc{color:var(--jp)}
.card[data-g="INTL"] .soc{color:var(--intl)}
.empty{margin-top:40px;text-align:center;color:var(--ink-soft);font-size:14px}
footer{max-width:1020px;margin:0 auto 40px;padding:18px 24px 0;font-size:12.5px;color:var(--ink-soft);border-top:1px solid var(--line)}
@media(max-width:660px){
  .card{grid-template-columns:1fr;gap:7px}.right{flex-direction:row;align-items:center}
  .langsw{position:static;margin-bottom:14px;width:max-content}
}
</style>
</head>

/* ══════════ 렌더링 ══════════ */
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const fmt2=n=>String(n).padStart(2,"0");
const parse=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)};
const dd=d=>Math.round((d-TODAY)/86400000);
const isPast=m=>m.forcePast||(m.start?dd(parse(m.end||m.start))<0:false);

function dateBlock(m){
  if(!m.start)return`<div class="date"><span class="tbd">${t("dateTbd")}<br>(${m.yearHint||"?"})</span></div>`;
  const dw=T.dow[LANG];
  const s=parse(m.start),e=parse(m.end||m.start);
  const t1=`<span class="mo">${s.getMonth()+1}/${fmt2(s.getDate())}</span>(${dw[s.getDay()]})`;
  if(m.end&&m.end!==m.start)
    return`<div class="date">${t1}<br>– <span class="mo">${e.getMonth()+1}/${fmt2(e.getDate())}</span>(${dw[e.getDay()]})</div>`;
  return`<div class="date">${t1}</div>`;
}
function badge(m){
  if(isPast(m))return`<span class="badge done">${t("bDone")}</span>`;
  if(m.status==="confirmed")return`<span class="badge ok">${t("bOk")}</span>`;
  if(m.status==="date-only")return`<span class="badge part">${t("bPart")}</span>`;
  if(m.status==="provisional")return`<span class="badge part">${t("bProv")}</span>`;
  return`<span class="badge tbd">${t("bTbd")}</span>`;
}
function dtag(m){
  if(isPast(m)||!m.start)return"";
  const d=dd(parse(m.start));
  if(d===0)return`<span class="ddaytag hot">D-DAY</span>`;
  if(d<0)return`<span class="ddaytag hot">${t("ongoing")}</span>`;
  return`<span class="ddaytag ${d<=90?"hot":""}">D-${d}</span>`;
}
function cardHTML(m,fresh){
  const note=L(m.note);
  return`<article class="card ${isPast(m)?"past":""} ${fresh?"fresh":""}" data-g="${m.group}">
    ${dateBlock(m)}
    <div class="body"><span class="soc">${m.soc}</span>
      <h3><a href="${m.url}" target="_blank" rel="noopener">${L(m.name)}</a></h3>
      <div class="meta"><span class="loc">${L(m.city)}, ${L(m.country)}</span> · ${L(m.venue)}</div>
      ${note?`<div class="note">${note}</div>`:""}
    </div>
    <div class="right">${badge(m)}${dtag(m)}</div></article>`;
}

let filter="all",socFilter="all",showPast=false,freshSet=new Set(),lastFresh=new Set();
const gYear=m=>m.start?parse(m.start).getFullYear():(m.yearHint||9999);
const sKey=m=>m.start?parse(m.start).getTime():new Date(m.yearHint||2099,11,31).getTime();

function buildSocSelect(){
  const sel=document.getElementById("socSel");
  const socs=[...new Set(MEETINGS.map(m=>m.soc))].sort();
  sel.innerHTML=`<option value="all">${t("allSoc")}</option>`+socs.map(s=>`<option>${s}</option>`).join("");
  sel.value=socs.includes(socFilter)?socFilter:"all";
}
function render(){
  const list=document.getElementById("list");
  let items=MEETINGS.filter(m=>{
    if(filter==="KR"&&m.group!=="KR")return false;
    if(filter==="INT"&&m.group==="KR")return false;
    if(socFilter!=="all"&&m.soc!==socFilter)return false;
    if(!showPast&&isPast(m))return false;
    return true;
  }).sort((a,b)=>sKey(a)-sKey(b));
  if(!items.length){list.innerHTML=`<div class="empty">${t("empty")}</div>`;return;}
  const years=[...new Set(items.map(gYear))].sort();
  list.innerHTML=years.map(y=>`<section class="yeargroup"><h2>${y===9999?t("yearTbd"):y}</h2>
    <div class="cards">${items.filter(m=>gYear(m)===y).map(m=>cardHTML(m,freshSet.has(m.soc+"|"+L(m.name)))).join("")}</div></section>`).join("");
  freshSet.clear();
}
function applyLang(){
  document.documentElement.lang=LANG;
  document.querySelectorAll("[data-t]").forEach(el=>{el.textContent=t(el.dataset.t)});
  document.getElementById("pastBtn").textContent=showPast?t("hidePast"):t("showPast");
  const st=document.getElementById("updStatus");
  if(!st.dataset.dynamic)st.textContent=t("aiIdle");
  document.getElementById("langKo").classList.toggle("on",LANG==="ko");
  document.getElementById("langEn").classList.toggle("on",LANG==="en");
  buildSocSelect();render();
}
document.getElementById("langKo").addEventListener("click",()=>{LANG="ko";applyLang();});
document.getElementById("langEn").addEventListener("click",()=>{LANG="en";applyLang();});

document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on");filter=c.dataset.f;render();
}));
document.getElementById("socSel").addEventListener("change",e=>{socFilter=e.target.value;render();});
document.getElementById("pastBtn").addEventListener("click",e=>{
  showPast=!showPast;e.target.textContent=showPast?t("hidePast"):t("showPast");render();
});

/* ══════════ data.json 로더 (GitHub Actions가 매일 갱신) ══════════ */
async function loadData(){
  try{
    const res=await fetch("data.json?ts="+Date.now());
    if(!res.ok)throw 0;
    const d=await res.json();
    if(Array.isArray(d.meetings)&&d.meetings.length){MEETINGS=d.meetings;}
    if(d.meta&&d.meta.lastUpdated){
      const dt=new Date(d.meta.lastUpdated);
      document.getElementById("lastAiCheck").innerHTML=
        t("aiChecked")+" <b>"+dt.getFullYear()+"-"+fmt2(dt.getMonth()+1)+"-"+fmt2(dt.getDate())+"</b>";
    }
  }catch(e){}
  document.getElementById("updStatus").textContent=t("aiIdle");
  buildSocSelect();render();
}

applyLang();
loadData();
</script>
